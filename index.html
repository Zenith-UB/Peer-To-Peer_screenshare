<!DOCTYPE html>
<html>
<head>
  <title>P-t-P Screen Share</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    body { font-family: Arial; text-align: center; }
    video { width: 80%; border: 2px solid black; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Peer-to-Peer Screen Share</h2>

<button onclick="startSharing()">Start Sharing</button>
<p>Your Code: <span id="myId">...</span></p>

<hr>

<input id="peerId" placeholder="Enter code to view">
<button onclick="connect()">View Screen</button>

<video id="video" autoplay playsinline></video>

<script>
let peer = new Peer();
let currentStream = null;

peer.on("open", id => {
  document.getElementById("myId").innerText = id;
});

peer.on("call", call => {
  if (currentStream) {
    call.answer(currentStream);
  } else {
    alert("Host not sharing yet.");
  }
});

async function startSharing() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
    alert("Screen sharing not supported.");
    return;
  }

  try {
    currentStream = await navigator.mediaDevices.getDisplayMedia({
      video: true,
      audio: true
    });

    alert("Started, Give your code to someone.");

  } catch (e) {
    alert("Error: " + e);
  }
}

function connect() {
  const id = document.getElementById("peerId").value;

  const call = peer.call(id, null);

  call.on("stream", remoteStream => {
    const video = document.getElementById("video");
    video.srcObject = remoteStream;
    video.play();
  });

  call.on("error", err => {
    alert("Connection error: " + err);
  });
}
</script>

</body>
</html>
